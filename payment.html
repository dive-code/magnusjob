<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnus Registration</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Poppins", Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0f1a;
  color:#fff;
  padding:20px;
}

/* MAIN CARD (NOW PURE BLACK) */
.container{
  width:100%;
  max-width:460px;
  background:#000000;
  border:1px solid #1f1f1f;
  border-radius:16px;
  padding:26px;
  box-shadow:0 25px 70px rgba(0,0,0,0.8);
}

/* BRAND */
.brand{
  text-align:center;
  font-size:12px;
  letter-spacing:6px;
  color:#fbbf24;
  margin-bottom:12px;
}

/* HEADER */
h1{
  text-align:center;
  font-size:1.4rem;
  margin-bottom:6px;
  color:#ffffff;
}

.sub{
  text-align:center;
  font-size:0.9rem;
  color:#9ca3af;
  margin-bottom:6px;
}

.tagline{
  text-align:center;
  font-size:0.85rem;
  color:#fbbf24;
  font-weight:500;
  margin-bottom:18px;
}

/* PROMO BOX */
.promo{
  background:rgba(251,191,36,0.08);
  border:1px solid rgba(251,191,36,0.25);
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-size:0.85rem;
  font-weight:500;
  color:#fbbf24;
  margin-bottom:20px;
}

/* FORM */
label{
  font-size:0.8rem;
  margin-top:12px;
  display:block;
  color:#9ca3af;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #1f1f1f;
  background:#0a0a0a;
  color:#fff;
  outline:none;
  font-size:0.9rem;
  transition:0.2s ease;
}

input:focus{
  border-color:#fbbf24;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  background:#fbbf24;
  color:#000;
  transition:0.2s ease;
}

button:hover{
  background:#f59e0b;
}

/* LOGIN */
.login{
  text-align:center;
  margin-top:15px;
  font-size:0.85rem;
  color:#9ca3af;
}

.login a{
  color:#fbbf24;
  text-decoration:none;
}

/* ERROR */
.error{
  font-size:0.75rem;
  color:#ef4444;
  display:none;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

  <div class="brand">MAGNUS</div>

  <h1>Create Your Account</h1>
  <div class="sub">Start your journey with Magnus today</div>
  <div class="tagline">Turn entertainment into income</div>

  <div class="promo">
    Register today and unlock ₦27,500 instant cashback after activation
  </div>

  <form id="form">

    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name">

    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email">
    <div class="error" id="emailErr">Invalid email address</div>

    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter your phone number">

    <label>Password</label>
    <input type="password" id="password" placeholder="Create password">

    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Confirm password">
    <div class="error" id="passErr">Passwords do not match</div>

    <button type="submit">Create Account & Continue</button>

  </form>

  <div class="login">
    Already have an account? <a href="#">Login</a>
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const confirm = document.getElementById("confirm");

  const emailErr = document.getElementById("emailErr");
  const passErr = document.getElementById("passErr");

  let valid = true;

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailPattern.test(email.value.trim())){
    emailErr.style.display = "block";
    valid = false;
  } else {
    emailErr.style.display = "none";
  }

  if(password.value !== confirm.value){
    passErr.style.display = "block";
    valid = false;
  } else {
    passErr.style.display = "none";
  }

  if(!valid) return;

  alert("Account created successfully!");
  window.location.href = "dashboard.html";
});
</script>

</body>
</html>
